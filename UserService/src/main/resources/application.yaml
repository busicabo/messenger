server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://postgres-user:5432/postgres}
    username: ${USER_DB_USERNAME:postgres}
    password: ${USER_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: app-pool
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:15000}
      idle-timeout: ${DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_MAX_LIFETIME:1200000}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  mvc:
    problemdetails:
      enabled: true
    format:
      date: iso
      date-time: iso
      time: iso

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  sql:
    init:
      mode: always
      schema-locations: classpath:start.sql

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

storage:
  s3:
    endpoint: ${S3_ENDPOINT}
    region: ${S3_REGION}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    avatars-bucket: ${S3_AVATARS_BUCKET}
    files-bucket: ${S3_FILES_BUCKET}
    avatar-temp-bucket: ${S3_AVATAR_TEMP_BUCKET}
    upload-url-ttl: ${S3_UPLOAD_URL_TTL}
    download-url-ttl: ${S3_DOWNLOAD_URL_TTL}
    avatar-max-file-size: ${S3_AVATAR_MAX_FILE_SIZE}
    avatar-cleanup-fixed-delay: ${S3_AVATAR_CLEANUP_FIXED_DELAY}
