<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>

<h2>Mini Chat</h2>

<div>
    <button id="connectBtn">Connect</button>
</div>

<hr>

<h3>Личный чат</h3>
<div>
    <input id="privateTargetId" type="text" placeholder="targetId">
    <input id="privateMessage" type="text" placeholder="message">
    <button id="sendPrivateBtn">Send Private Message</button>
</div>

<hr>

<h3>Групповой чат</h3>
<div>
    <input id="groupChatId" type="text" placeholder="chatId">
    <button id="subscribeGroupBtn">Subscribe Group</button>
    <button id="listenChatBtn">Listen Chat By Id</button>
    <input id="groupMessage" type="text" placeholder="group message">
    <button id="sendGroupBtn">Send Group Message</button>
</div>

<hr>

<h3>Log</h3>
<pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.1.1/bundles/stomp.umd.min.js"></script>
<script>
    let client = null;
    const logEl = document.getElementById("log");
    const groupSubscriptions = new Map();

    function log(text) {
        logEl.textContent += text + "\n";
    }

    document.getElementById("connectBtn").addEventListener("click", () => {
        if (client && client.active) {
            log("ALREADY CONNECTING OR CONNECTED");
            return;
        }

        client = new StompJs.Client({
            webSocketFactory: () => new SockJS("/ws"),
            reconnectDelay: 5000,
            debug: (str) => log("[DEBUG] " + str),

            onConnect: () => {
                log("CONNECTED");

                client.subscribe("/user/queue/request", (frame) => {    log("PRIVATE INCOMING: " + frame.body);});log("SUBSCRIBED TO /user/queue/request");
            },

            onStompError: (frame) => {
                log("STOMP ERROR: " + (frame.headers["message"] || "UNKNOWN"));
                log("DETAILS: " + frame.body);
            },

            onWebSocketClose: () => {
                log("SOCKET CLOSED");
            },

            onWebSocketError: (event) => {
                log("SOCKET ERROR");
                console.error(event);
            }
        });

        client.activate();
    });

    function subscribeToChatById(chatId) {
        if (!client || !client.connected) {
            log("NOT CONNECTED");
            return;
        }

        if (!chatId) {
            log("CHAT ID IS EMPTY");
            return;
        }

        if (groupSubscriptions.has(chatId)) {
            log("ALREADY LISTENING TO /topic/" + chatId);
            return;
        }

        const subscription = client.subscribe("/topic/" + chatId, (frame) => {
            log("GROUP INCOMING [" + chatId + "]: " + frame.body);
        });

        groupSubscriptions.set(chatId, subscription);
        log("SUBSCRIBED TO /topic/" + chatId);
    }

    document.getElementById("subscribeGroupBtn").addEventListener("click", () => {
        const chatId = document.getElementById("groupChatId").value.trim();
        subscribeToChatById(chatId);
    });

    document.getElementById("listenChatBtn").addEventListener("click", () => {
        const chatId = document.getElementById("groupChatId").value.trim();
        subscribeToChatById(chatId);
    });

    document.getElementById("sendPrivateBtn").addEventListener("click", () => {
        if (!client || !client.connected) {
            log("NOT CONNECTED");
            return;
        }

        const targetId = document.getElementById("privateTargetId").value.trim();
        const message = document.getElementById("privateMessage").value.trim();

        if (!targetId || !message) {
            log("PRIVATE targetId OR message IS EMPTY");
            return;
        }

        const payload = {
            targetId: targetId,
            message: message
        };

        client.publish({
            destination: "/app/chat.private.sender",
            body: JSON.stringify(payload)
        });

        log("PRIVATE SENT: " + JSON.stringify(payload));
    });

    document.getElementById("sendGroupBtn").addEventListener("click", () => {
        if (!client || !client.connected) {
            log("NOT CONNECTED");
            return;
        }

        const chatId = document.getElementById("groupChatId").value.trim();
        const text = document.getElementById("groupMessage").value.trim();

        if (!chatId || !text) {
            log("GROUP chatId OR text IS EMPTY");
            return;
        }

        const payload = {
            chatId: chatId,
            text: text
        };

        client.publish({
            destination: "/app/char.group.sender",
            body: JSON.stringify(payload)
        });

        log("GROUP SENT: " + JSON.stringify(payload));
    });
</script>

</body>
</html>
