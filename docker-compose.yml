services:
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-postgres}
      POSTGRES_USER: ${USER_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-postgres}
#    ports:
#      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USERNAME:-postgres} -d ${USER_DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mescat-net

  postgres-message:
    image: postgres:16-alpine
    container_name: postgres-message
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MESSAGE_DB_NAME:-postgres}
      POSTGRES_USER: ${MESSAGE_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${MESSAGE_DB_PASSWORD:-postgres}
#    ports:
#      - "5435:5432"
    volumes:
      - postgres-message-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MESSAGE_DB_USERNAME:-postgres} -d ${MESSAGE_DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mescat-net

  postgres-keyvault:
    image: postgres:16-alpine
    container_name: postgres-keyvault
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYVAULT_DB_NAME:-postgres}
      POSTGRES_USER: ${KEYVAULT_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${KEYVAULT_DB_PASSWORD:-postgres}
#    ports:
#      - "5436:5432"
    volumes:
      - postgres-keyvault-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYVAULT_DB_USERNAME:-postgres} -d ${KEYVAULT_DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mescat-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
#    ports:
#      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mescat-net

  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
#    ports:
#      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://kafka:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mescat-net

  kafka-init-topics:
    image: apache/kafka:4.1.2
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list; do
          sleep 2
        done

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic delete-encrypt-keys --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic message-service --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic chat-service --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic encrypt-keys-service --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic user-online --partitions 3 --replication-factor 1
    restart: "no"
    networks:
      - mescat-net

  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      USER_DB_URL: jdbc:postgresql://postgres-user:5432/${USER_DB_NAME:-postgres}
      USER_DB_USERNAME: ${USER_DB_USERNAME:-postgres}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:-postgres}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.firstvds.ru}
      S3_REGION: ${S3_REGION:-default}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_AVATARS_BUCKET: ${S3_AVATARS_BUCKET:-mescat-avatars}
      S3_FILES_BUCKET: ${S3_FILES_BUCKET:-mescat-files}
      S3_AVATAR_TEMP_BUCKET: ${S3_AVATAR_TEMP_BUCKET:-mescat-files}
      S3_UPLOAD_URL_TTL: ${S3_UPLOAD_URL_TTL:-3m}
      S3_DOWNLOAD_URL_TTL: ${S3_DOWNLOAD_URL_TTL:-5m}
      S3_AVATAR_MAX_FILE_SIZE: ${S3_AVATAR_MAX_FILE_SIZE:-5MB}
      S3_AVATAR_CLEANUP_FIXED_DELAY: ${S3_AVATAR_CLEANUP_FIXED_DELAY:-60000}
#    ports:
#      - "8081:8081"
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - mescat-net

  key-vault-service:
    build:
      context: ./KeyVaultService
      dockerfile: Dockerfile
    container_name: key-vault-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8085
      KEYVAULT_DB_URL: jdbc:postgresql://postgres-keyvault:5432/${KEYVAULT_DB_NAME:-postgres}
      KEYVAULT_DB_USERNAME: ${KEYVAULT_DB_USERNAME:-postgres}
      KEYVAULT_DB_PASSWORD: ${KEYVAULT_DB_PASSWORD:-postgres}
#    ports:
#      - "8085:8085"
    depends_on:
      postgres-keyvault:
        condition: service_healthy
    networks:
      - mescat-net

  message-service:
    build:
      context: ./MessageService
      dockerfile: Dockerfile
    container_name: message-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      MESSAGE_DB_URL: jdbc:postgresql://postgres-message:5432/${MESSAGE_DB_NAME:-postgres}
      MESSAGE_DB_USERNAME: ${MESSAGE_DB_USERNAME:-postgres}
      MESSAGE_DB_PASSWORD: ${MESSAGE_DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      USER_SERVICE_URL: http://user-service:8081
      KEY_VAULT_SERVICE_URL: http://key-vault-service:8085
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-dev-only-change-me-dev-only-change-me}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.firstvds.ru}
      S3_REGION: ${S3_REGION:-default}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_AVATARS_BUCKET: ${S3_AVATARS_BUCKET:-mescat-avatars}
      S3_FILES_BUCKET: ${S3_FILES_BUCKET:-mescat-files}
      S3_UPLOAD_URL_TTL: ${S3_UPLOAD_URL_TTL:-3m}
      S3_DOWNLOAD_URL_TTL: ${S3_DOWNLOAD_URL_TTL:-5m}
      S3_MAX_FILE_SIZE: ${S3_MAX_FILE_SIZE:-100MB}
      S3_CLEANUP_FIXED_DELAY: ${S3_CLEANUP_FIXED_DELAY:-60000}
#    ports:
#      - "8082:8082"
    depends_on:
      postgres-message:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      key-vault-service:
        condition: service_started
    networks:
      - mescat-net

  gateway:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      USER_SERVICE_URL: http://user-service:8081
      MESSAGE_SERVICE_URL: http://message-service:8082
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-dev-only-change-me-dev-only-change-me}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      message-service:
        condition: service_started
    networks:
      - mescat-net

volumes:
  postgres-user-data:
  postgres-message-data:
  postgres-keyvault-data:
  redis-data:

networks:
  mescat-net:
    driver: bridge
